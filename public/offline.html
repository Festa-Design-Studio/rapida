<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — RAPIDA</title>
    <style>
        body { font-family: 'Noto Sans', system-ui, sans-serif; background: #f0f7fa; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 16px; }
        .container { text-align: center; max-width: 400px; }
        h1 { font-family: 'Inter', system-ui, sans-serif; font-size: 1.5rem; color: #1a3a4a; margin-bottom: 8px; }
        p { font-size: 1rem; line-height: 1.6; color: #555; }
        .badge { display: inline-block; background: #fdf6ec; color: #7a4510; padding: 4px 12px; border-radius: 9999px; font-size: 0.875rem; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're offline</h1>
        <p>Your reports are saved on this device and will send automatically when you're connected again.</p>
        <span class="badge">No rush — your data is safe</span>
    </div>
</body>
</html>
